    ]
  },

    cards: [

    ]

const allSearchableItems = [];
sections.forEach((s, si) => { s.cards.forEach((c, ci) => {
  const t = [c.title||"",c.content||"",c.question||"",c.answer||"",c.prompt||"",c.promptTemplate||"",c.description||"",...(c.dos||[]),...(c.donts||[]),...(c.steps||[]).map(s=>s.text),...(c.items||[]).map(i=>`${i.name} ${i.desc}`),...(c.tabs||[]).map(t=>`${t.label} ${t.content}`),...(c.terms||[]).map(t=>`${t.term} ${t.definition}`),...(c.stats||[]).map(s=>`${s.label} ${s.detail}`),...(c.fields||[]).map(f=>f.label)].join(" ").toLowerCase();
  allSearchableItems.push({ sectionIdx:si, cardIdx:ci, text:t, id:c.id });
});});

window.BrandSprintCheatSheet = function BrandSprintCheatSheet() {
  const [expandedTip, setExpandedTip] = useState(null);
  const [activeTab, setActiveTab] = useState({});
  const [copiedId, setCopiedId] = useState(null);
  const [revealedQuiz, setRevealedQuiz] = useState({});
  const [expandedTerms, setExpandedTerms] = useState({});
  const [starred, setStarred] = useState({});
  const [searchQuery, setSearchQuery] = useState("");
  const [activeDay, setActiveDay] = useState(0);
  const [completedDays, setCompletedDays] = useState({});
  const [fillValues, setFillValues] = useState({});

  const isSearching = searchQuery.trim().length > 0;
  const filteredSections = useMemo(() => {
    if (!isSearching) return sections.map((s,i)=>({...s,originalIdx:i,visibleCards:s.cards.map((_,ci)=>ci)}));
    const q = searchQuery.toLowerCase();
    return sections.map((section,si)=>{
      const vc = section.cards.map((_,ci)=>ci).filter(ci=>{const it=allSearchableItems.find(x=>x.sectionIdx===si&&x.cardIdx===ci);return it&&it.text.includes(q);});
      return {...section,originalIdx:si,visibleCards:vc};
    }).filter(s=>s.visibleCards.length>0);
  }, [searchQuery, isSearching]);

  const toggleTip = id => setExpandedTip(p => p===id?null:id);
  const toggleQuiz = id => setRevealedQuiz(p => ({...p,[id]:!p[id]}));
  const toggleTerm = id => setExpandedTerms(p => ({...p,[id]:!p[id]}));
  const toggleStar = id => setStarred(p => ({...p,[id]:!p[id]}));
  const toggleComplete = i => setCompletedDays(p => ({...p,[i]:!p[i]}));

  const setField = (cardId, key, val) => setFillValues(p => ({...p,[`${cardId}_${key}`]:val}));
  const getField = (cardId, key) => fillValues[`${cardId}_${key}`] || "";

  const copyText = (text, id) => {
    try { const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;left:-9999px;top:-9999px;opacity:0";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopiedId(id);setTimeout(()=>setCopiedId(null),2000); } catch(e){}
  };

  const getTab = cardId => activeTab[cardId]||0;
  const completedCount = Object.values(completedDays).filter(Boolean).length;
  const currentSection = sections[activeDay];

  const renderCard = (card) => {
    const cardId = card.id;
    const isStarred = starred[cardId];
    const starBtn = <span onClick={e=>{e.stopPropagation();toggleStar(cardId)}} style={{cursor:"pointer",fontSize:16,opacity:isStarred?1:0.3,transition:"all 0.2s",position:"absolute",top:20,right:20}} title={isStarred?"Unstar":"Star this card"}>{isStarred?"⭐":"☆"}</span>;

    if (card.type === "golden-rule") return (
      <div className="card golden-rule-card" key={cardId} style={{position:"relative"}}>{starBtn}<div className="golden-rule-icon">💎</div><div className="card-title">{card.title}</div><div className="card-text">{card.content}</div></div>
    );

    if (card.type === "fillable") {
      const allFilled = card.fields.every(f => getField(cardId, f.key).trim());
      const output = allFilled ? card.fields.reduce((str,f) => str.replace(`{${f.key}}`, getField(cardId,f.key)), card.outputTemplate) : "";
      return (
        <div className="card fillable-card" key={cardId} style={{position:"relative"}}>
          {starBtn}
          <div className="card-title">{card.title}</div>
          {card.exampleNote && <div className="fill-example-note">{card.exampleNote}</div>}
          <div className="fill-fields">
            {card.fields.map(f => (
              <div className="fill-field" key={f.key}>
                <label className="fill-label">{f.label}</label>
                <input className="fill-input" type="text" placeholder={f.placeholder} value={getField(cardId,f.key)} onChange={e=>setField(cardId,f.key,e.target.value)} />
              </div>
            ))}
          </div>
          {allFilled && (
            <div className="fill-output">
              <div className="fill-output-text">{output}</div>

    if (card.type === "prompt-card") {

    if (card.type === "fillable-prompt") {

        .quiz-answer-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;font-weight:700;color:#4caf80;margin-right:6px;}
        .quiz-reveal{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(255,209,102,0.5);font-style:italic;}

        .glossary-list{display:flex;flex-direction:column;gap:6px;}
        .glossary-item{background:#FAFAF5;border-radius:10px;padding:14px 16px;transition:background 0.2s;}
        .glossary-item:hover{background:#f0efe8;}
        .glossary-term-row{display:flex;justify-content:space-between;align-items:center;}
        .glossary-term{font-weight:700;font-size:14px;color:#1A1A1A;}
        .glossary-arrow{font-size:10px;color:#6B21FF;}
        .glossary-def{font-size:13.5px;line-height:1.65;color:#5a5565;margin-top:10px;padding-top:10px;border-top:1px dashed rgba(107,33,255,0.15);}

        .day-actions{max-width:660px;margin:24px auto 0;padding:0 24px 48px;}
        .day-actions-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;}
        .day-nav-btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;color:#6B21FF;background:none;border:1px solid rgba(107,33,255,0.2);padding:10px 18px;border-radius:10px;cursor:pointer;transition:all 0.2s;}
        .day-nav-btn:hover{background:rgba(107,33,255,0.05);border-color:rgba(107,33,255,0.4);}
        .day-nav-btn:disabled{opacity:0.25;cursor:default;pointer-events:none;}
        .day-complete-btn{font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;color:#fff;background:#6B21FF;border:none;padding:11px 22px;border-radius:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
        .day-complete-btn:hover{background:#5a1ad6;transform:translateY(-1px);}
        .day-complete-btn.is-completed{background:#3a8f5c;}
        .day-complete-btn.is-completed:hover{background:#2d7a4a;}

        .completion-card{max-width:660px;margin:36px auto 0;padding:0 24px 60px;}
        .completion-inner{background:linear-gradient(135deg,#0f0a1a 0%,#1A1A1A 50%,#2a1845 100%);border-radius:20px;padding:40px 28px;text-align:center;position:relative;overflow:hidden;}
        .completion-inner::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 50%,rgba(107,33,255,0.08) 0%,transparent 70%);pointer-events:none;}
        .completion-emoji{font-size:40px;margin-bottom:14px;position:relative;}
        .completion-title{font-family:'Syne',sans-serif;font-weight:600;font-size:22px;color:#FAFAF5;margin-bottom:10px;position:relative;}
        .completion-text{font-size:14px;line-height:1.7;color:rgba(250,250,245,0.6);max-width:400px;margin:0 auto;position:relative;}
        .completion-checklist{text-align:left;max-width:320px;margin:18px auto 0;position:relative;}
        .completion-check-item{font-size:13px;color:rgba(250,250,245,0.55);padding:3px 0;}
        .completion-check-item span{color:#4caf80;margin-right:8px;}
        .cta-button{display:inline-flex;align-items:center;gap:8px;background:#6B21FF;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;padding:14px 32px;border-radius:50px;border:none;cursor:pointer;margin-top:24px;transition:all 0.25s ease;text-decoration:none;letter-spacing:0.3px;}
        .cta-button:hover{background:#5a1ad6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(107,33,255,0.3);}

        .footer-section{background:linear-gradient(180deg,#1A1A1A 0%,#0f0a1a 100%);padding:40px 24px;text-align:center;}
        .footer-brand{font-family:'Syne',sans-serif;font-weight:600;font-size:16px;color:#FAFAF5;margin-bottom:4px;letter-spacing:1px;}
        .footer-tagline{font-size:12px;font-style:italic;color:rgba(250,250,245,0.35);margin-bottom:20px;}
        .footer-cta{display:inline-flex;align-items:center;gap:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;color:#FFD166;text-decoration:none;padding:12px 28px;border:1px solid rgba(255,209,102,0.3);border-radius:50px;transition:all 0.2s;letter-spacing:0.3px;}
        .footer-cta:hover{background:rgba(255,209,102,0.08);border-color:#FFD166;transform:translateY(-1px);}
        .footer-divider{width:40px;height:1px;background:rgba(250,250,245,0.08);margin:20px auto;}
        .footer-credit{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(250,250,245,0.2);}

        @media(max-width:520px){
          .header-section{padding:32px 20px 20px;}
          .section-block{padding:0 16px;}
          .dodont-grid{grid-template-columns:1fr;}
          .cat-grid{grid-template-columns:1fr;}
          .numbers-grid{grid-template-columns:1fr;}
          .completion-inner{padding:28px 18px;}
          .tabs-row{gap:4px;}.tab-btn{padding:8px 10px;font-size:11px;}
          .search-wrapper{padding:0 16px;}
          .starred-panel{padding:0 16px;}
          .day-actions{padding:0 16px 40px;}
          .day-actions-inner{flex-wrap:wrap;justify-content:center;}
          .day-tab{padding:10px 4px 8px;min-width:56px;}
          .day-tab-name{font-size:9px;}.day-tab-num{font-size:8px;}
          .fill-input{font-size:13px;padding:9px 12px;}
        }
      `}</style>

      <div className="header-section">
        <div className="artifact-label">THE MVB LAB.</div>
        <div className="main-title">7-Day Brand Sprint<span className="main-title-accent">Quick Reference</span></div>
        <div className="subtitle">Every framework, formula, and prompt from the sprint. All in one place.</div>
        <div className="progress-wrapper">
          <div className="progress-bar-bg"><div className="progress-bar-fill" style={{width:`${(completedCount/7)*100}%`}}/></div>
          <div className="progress-text">{completedCount} of 7 days complete</div>
        </div>
      </div>

      <div className="day-nav-wrapper">
        <div className="day-nav">
          {sections.map((s,i)=>(
            <div key={i} className={`day-tab ${activeDay===i&&!isSearching?"day-tab-active":""} ${completedDays[i]?"day-tab-done":""}`} onClick={()=>{setActiveDay(i);setSearchQuery("");}}>
              {completedDays[i] && <span className="day-tab-check-icon">✓</span>}
              <span className="day-tab-num">Day {i+1}</span>
              <span className="day-tab-name">{s.shortTitle}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="search-wrapper">
        <div className="search-box">
          <span className="search-icon">🔍</span>
          <input className="search-input" type="text" placeholder="Search across all days..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/>
          {searchQuery&&<button className="search-clear" onClick={()=>setSearchQuery("")}>✕</button>}
        </div>
      </div>
      {isSearching&&<div className="search-hint"><div className="search-hint-text">Showing results across all 7 days</div></div>}

      {starredCards.length>0&&!isSearching&&(
        <div className="starred-panel"><div className="starred-inner"><div className="starred-label">⭐ YOUR STARRED CARDS</div>
          {starredCards.map((s,i)=>(<div className="starred-item" key={i}><span className="starred-section-tag">{s.sectionLabel}</span><span>{s.card.title}</span></div>))}
        </div></div>
      )}

      {isSearching ? (
        <>
          {filteredSections.map(section=>(
            <div className="section-block" key={section.originalIdx}>
              <div className="section-header"><div className="section-number">{String(section.originalIdx+1).padStart(2,"0")}</div><div><div className="section-label">{section.label}</div><div className="section-title">{section.title}{" "}<span className="section-title-accent">{section.titleAccent}</span></div></div></div>
              {section.visibleCards.map(ci=>renderCard(section.cards[ci]))}
            </div>
          ))}
          {filteredSections.length===0&&(
            <div style={{maxWidth:660,margin:"48px auto",padding:"0 24px",textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:12}}>🔍</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:600,color:"#1A1A1A",marginBottom:8}}>No results found</div>
              <div style={{fontSize:14,color:"#7a7485"}}>Try a different term or <button onClick={()=>setSearchQuery("")} style={{color:"#6B21FF",background:"none",border:"none",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>clear the search</button></div>
            </div>
          )}
        </>
      ) : (
        <>
          <div className="section-block">
            <div className="section-header"><div className="section-number">{String(activeDay+1).padStart(2,"0")}</div><div><div className="section-label">{currentSection.label}</div><div className="section-title">{currentSection.title}{" "}<span className="section-title-accent">{currentSection.titleAccent}</span></div></div></div>
            {currentSection.cards.map(card=>renderCard(card))}
          </div>
          <div className="day-actions"><div className="day-actions-inner">
            <button className="day-nav-btn" disabled={activeDay===0} onClick={()=>setActiveDay(p=>p-1)}>← Previous</button>
            <button className={`day-complete-btn ${completedDays[activeDay]?"is-completed":""}`} onClick={()=>toggleComplete(activeDay)}>{completedDays[activeDay]?"✓ Completed":"Mark Complete"}</button>
            <button className="day-nav-btn" disabled={activeDay===6} onClick={()=>setActiveDay(p=>p+1)}>Next →</button>
          </div></div>
          {completedCount===7&&(
            <div className="completion-card"><div className="completion-inner">
              <div className="completion-emoji">🚀</div>
              <div className="completion-title">You Did It. Now Keep Going.</div>
              <div className="completion-text">Your brand is built. Now let's get it seen. Show up 3 times a week. Stick to the rhythm.</div>
              <div className="completion-checklist">
                <div className="completion-check-item"><span>✅</span> Clear positioning</div>
                <div className="completion-check-item"><span>✅</span> Your founder story</div>
                <div className="completion-check-item"><span>✅</span> Visual identity</div>
                <div className="completion-check-item"><span>✅</span> Optimized profile</div>
                <div className="completion-check-item"><span>✅</span> First authority asset shipped</div>
                <div className="completion-check-item"><span>✅</span> Sustainable weekly rhythm</div>
              </div>
              <a href="https://www.skool.com/mvb/about" className="cta-button" target="_blank" rel="noopener noreferrer">Join MVB Lab <span>→</span></a>
            </div></div>
          )}
        </>
      )}

      <div className="footer-section">
        <div className="footer-brand">THE MVB LAB.</div>
        <div className="footer-tagline">Authenticity over polish. Clarity over noise.</div>
        <a href="https://www.skool.com/mvb/about" className="footer-cta" target="_blank" rel="noopener noreferrer">Join Community →</a>
        <div className="footer-divider"/>
        <div className="footer-credit">THE MVB LAB. • skool.com/mvb</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(BrandSprintCheatSheet));
</script>
</body>
</html>
